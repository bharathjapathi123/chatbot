<!DOCTYPE html>
<html>

<head>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/fac54f0bd8.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="chatbot.css">
</head>

<body>
    <div class="p-2">

        <!-- Heading -->
        <h1 class="text-center chatbot-heading">Meet our Chatbot</h1>

        <!-- Bot Image -->
        <img class="image" src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/chatbot-bot-img.png" />

        <!-- Chat Area -->
        <div class="chat-container" id="chatContainer"></div>

        <!-- User Image -->
        <div class="d-flex flex-row justify-content-end">
            <img class="image" src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/chatbot-boy-img.png" />
        </div>

        <!-- Input Box -->
        <div class="d-flex flex-row justify-content-center fixed-bottom">
            <input class="user-input" id="userInput" placeholder="Type a message..." />

            <button class="send-msg-btn" id="sendMsgBtn">
                <i class="fa-solid fa-rocket"></i>
            </button>
        </div>

    </div>

    <!-- Custom JS -->
    <script src="chatbot.js"></script>
</body>

</html>
